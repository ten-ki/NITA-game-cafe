{% extends "base.html" %}
{% block title %}ログイン | Asobiba Game Cafe{% endblock %}
{% block content %}
<section class="auth-card">
  <h1>ログイン</h1>
  <p class="muted">ユーザー名と 4 桁 PIN でログインします。</p>
  {% if error %}<div class="error-box">{{ error }}</div>{% endif %}
  <form method="post" class="stack-form">
    <label>
      <span>ユーザー名</span>
      <input type="text" name="username" value="{{ username or '' }}" maxlength="20" required>
    </label>
    <label>
      <span>PIN</span>
      <input type="password" name="pin" inputmode="numeric" pattern="[0-9]{4}" maxlength="4" required>
    </label>
    <button class="wood-button" type="submit">ログインする</button>
  </form>
</section>
{% endblock %}
