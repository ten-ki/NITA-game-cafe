services:
  - type: web
    name: nita-game-cafe
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ASOBIBA_SECRET
        generateValue: true
      - key: ASOBIBA_DB_PATH
        value: /var/data/asobiba.sqlite3
    disk:
      name: asobiba-data
      mountPath: /var/data
      sizeGB: 1
